<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управления производством</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #1a1a1a;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .main-page {
            text-align: center;
            padding: 50px 20px;
        }

        .main-page h1 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: #2c3e50;
        }

        .btn-primary {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 6px;
        }

        .btn-primary:hover {
            background-color: #1e2b38;
        }

        .btn-secondary {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }

        .btn-danger {
            background-color: #c0392b;
        }

        .btn-success {
            background-color: #27ae60;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 500px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .productions-list {
            margin-top: 40px;
            display: grid;
            gap: 20px;
        }

        .production-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: left;
        }

        .production-card h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .production-actions {
            margin-top: 15px;
        }

        .site-page {
            background: white;
            border-radius: 8px;
            padding: 30px;
            margin-top: 20px;
        }

        .section {
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 20px;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .parts-list, .tasks-list {
            list-style: none;
            margin: 10px 0;
        }

        .parts-list li, .tasks-list li {
            background: #f9f9f9;
            margin: 8px 0;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .template-card {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .template-card:hover {
            border-color: #2c3e50;
            background: #f8f9fa;
        }

        .template-card.selected {
            border-color: #27ae60;
            background: #e8f8f0;
        }

        .part-item, .task-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .part-item input, .task-item input, .task-item select {
            flex: 1;
            margin: 0;
        }

        .export-import {
            margin-top: 30px;
            padding: 20px;
            background: #ecf0f1;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            background: #ecf0f1;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="main-page">
        <h1>Система управления производством</h1>
        <div id="dynamicContent"></div>
    </div>
</div>

<script>
    // Ключ для localStorage
    const STORAGE_KEY = 'productions_data_v2';
    
    // Шаблоны участков
    const SITE_TEMPLATES = [
        {
            id: 'mechanical',
            name: 'Механическая обработка',
            type: 'механический',
            defaultParts: [
                { name: 'Корпусная деталь', description: 'Изготовление корпусных деталей' },
                { name: 'Вал', description: 'Изготовление валов' }
            ],
            defaultTasks: [
                { title: 'Настройка оборудования', description: 'Проверить станки', status: 'Ожидает' },
                { title: 'Контроль качества', description: 'Проверить образцы', status: 'Ожидает' }
            ]
        },
        {
            id: 'welding',
            name: 'Сварочный участок',
            type: 'сварочный',
            defaultParts: [
                { name: 'Сварная рама', description: 'Сварка металлической рамы' },
                { name: 'Кронштейн', description: 'Изготовление кронштейнов' }
            ],
            defaultTasks: [
                { title: 'Подготовка металла', description: 'Очистка кромок', status: 'Ожидает' },
                { title: 'Сварка', description: 'Выполнить сварку', status: 'Ожидает' }
            ]
        },
        {
            id: 'assembly',
            name: 'Сборочный цех',
            type: 'сборочный',
            defaultParts: [
                { name: 'Узел крепления', description: 'Сборка крепежного узла' },
                { name: 'Механизм передачи', description: 'Сборка редуктора' }
            ],
            defaultTasks: [
                { title: 'Комплектация', description: 'Проверить детали', status: 'Ожидает' },
                { title: 'Сборка', description: 'Собрать узлы', status: 'Ожидает' },
                { title: 'Испытания', description: 'Провести тесты', status: 'Ожидает' }
            ]
        },
        {
            id: 'painting',
            name: 'Окрасочный участок',
            type: 'окрасочный',
            defaultParts: [
                { name: 'Заготовка под покраску', description: 'Подготовленная деталь' }
            ],
            defaultTasks: [
                { title: 'Очистка', description: 'Удалить загрязнения', status: 'Ожидает' },
                { title: 'Грунтовка', description: 'Нанести грунт', status: 'Ожидает' },
                { title: 'Окраска', description: 'Нанести покрытие', status: 'Ожидает' }
            ]
        },
        {
            id: 'empty',
            name: 'Пустой шаблон',
            type: 'пользовательский',
            defaultParts: [],
            defaultTasks: []
        }
    ];
    
    let productions = [];
    let currentProductionId = null;
    
    // Загрузка данных
    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                productions = JSON.parse(saved);
            } catch(e) {
                productions = [];
            }
        }
        if (productions.length === 0) {
            productions = [];
        }
        renderMainPage();
    }
    
    // Сохранение
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(productions));
    }
    
    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function renderMainPage() {
        currentProductionId = null;
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <button class="btn-primary" id="createProductionBtn">Создать производство</button>
            
            <div class="export-import">
                <button class="btn-secondary" id="exportDataBtn">Экспорт данных (JSON)</button>
                <label class="btn-secondary" style="display:inline-block; cursor:pointer;">
                    Импорт данных
                    <input type="file" id="importFileInput" accept=".json" style="display:none;">
                </label>
                <button class="btn-secondary btn-danger" id="clearDataBtn">Очистить все данные</button>
            </div>
            
            <div class="productions-list" id="productionsList">
                ${productions.length === 0 ? '<p>Нет созданных производств. Нажмите "Создать производство".</p>' : ''}
                ${productions.map(prod => `
                    <div class="production-card">
                        <h3>${escapeHtml(prod.name)}</h3>
                        <p><strong>Деятельность:</strong> ${escapeHtml(prod.activity)}</p>
                        <p><strong>Участков:</strong> ${prod.sites.length}</p>
                        <div class="production-actions">
                            <button class="btn-secondary open-site-btn" data-id="${prod.id}">Открыть участки</button>
                            <button class="btn-secondary edit-production-btn" data-id="${prod.id}">Редактировать</button>
                            <button class="btn-secondary btn-danger delete-production-btn" data-id="${prod.id}">Удалить</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        
        document.getElementById('createProductionBtn').addEventListener('click', showCreateProductionModal);
        document.getElementById('exportDataBtn').addEventListener('click', exportData);
        document.getElementById('clearDataBtn').addEventListener('click', clearAllData);
        const fileInput = document.getElementById('importFileInput');
        fileInput.addEventListener('change', importData);
        
        document.querySelectorAll('.open-site-btn').forEach(btn => {
            btn.addEventListener('click', () => renderSitesPage(btn.getAttribute('data-id')));
        });
        document.querySelectorAll('.edit-production-btn').forEach(btn => {
            btn.addEventListener('click', () => showEditProductionModal(btn.getAttribute('data-id')));
        });
        document.querySelectorAll('.delete-production-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (confirm('Удалить производство?')) {
                    productions = productions.filter(p => p.id !== btn.getAttribute('data-id'));
                    saveData();
                    renderMainPage();
                }
            });
        });
    }
    
    function showCreateProductionModal() {
        const modalHtml = `
            <div id="productionModal" class="modal" style="display:flex;">
                <div class="modal-content">
                    <h3>Новое производство</h3>
                    <label>Название:</label>
                    <input type="text" id="prodName" placeholder="Пример: Механический цех">
                    <label>Деятельность:</label>
                    <textarea id="prodActivity" placeholder="Описание..."></textarea>
                    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
                        <button class="btn-secondary" id="cancelModalBtn">Отмена</button>
                        <button class="btn-primary" id="saveProductionBtn">Сохранить</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('productionModal');
        
        document.getElementById('saveProductionBtn').addEventListener('click', () => {
            const name = document.getElementById('prodName').value.trim();
            if (!name) { alert('Введите название'); return; }
            productions.push({
                id: generateId(),
                name: name,
                activity: document.getElementById('prodActivity').value.trim() || 'Не указано',
                sites: []
            });
            saveData();
            renderMainPage();
            modal.remove();
        });
        document.getElementById('cancelModalBtn').addEventListener('click', () => modal.remove());
    }
    
    function showEditProductionModal(id) {
        const prod = productions.find(p => p.id === id);
        if (!prod) return;
        const modalHtml = `
            <div id="editProdModal" class="modal" style="display:flex;">
                <div class="modal-content">
                    <h3>Редактировать производство</h3>
                    <label>Название:</label>
                    <input type="text" id="editProdName" value="${escapeHtml(prod.name)}">
                    <label>Деятельность:</label>
                    <textarea id="editProdActivity">${escapeHtml(prod.activity)}</textarea>
                    <div style="display:flex; justify-content:flex-end; gap:10px;">
                        <button class="btn-secondary" id="cancelEditBtn">Отмена</button>
                        <button class="btn-primary" id="updateProductionBtn">Обновить</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('editProdModal');
        
        document.getElementById('updateProductionBtn').addEventListener('click', () => {
            prod.name = document.getElementById('editProdName').value.trim() || prod.name;
            prod.activity = document.getElementById('editProdActivity').value.trim() || 'Не указано';
            saveData();
            renderMainPage();
            modal.remove();
        });
        document.getElementById('cancelEditBtn').addEventListener('click', () => modal.remove());
    }
    
    function renderSitesPage(prodId) {
        currentProductionId = prodId;
        const prod = productions.find(p => p.id === prodId);
        if (!prod) { renderMainPage(); return; }
        
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div class="site-page">
                <a class="back-link" id="backToMain">← На главную</a>
                <h2>Производство: ${escapeHtml(prod.name)}</h2>
                <p>${escapeHtml(prod.activity)}</p>
                <div class="section">
                    <div class="section-title">Участки</div>
                    <button class="btn-primary" id="addSiteBtn">+ Добавить участок из шаблона</button>
                    <div id="sitesList" style="margin-top:20px;">
                        ${prod.sites.length === 0 ? '<p>Нет участков. Создайте первый участок.</p>' : ''}
                        ${prod.sites.map(site => `
                            <div style="border:1px solid #ddd; margin:15px 0; padding:15px; border-radius:6px;">
                                <h3>${escapeHtml(site.name)}</h3>
                                <p><strong>Тип:</strong> ${escapeHtml(site.type)}</p>
                                <p><strong>Деталей:</strong> ${site.parts.length} | <strong>Задач:</strong> ${site.tasks.length}</p>
                                <div>
                                    <button class="btn-secondary edit-site-btn" data-siteid="${site.id}">Ред. участок</button>
                                    <button class="btn-secondary btn-danger delete-site-btn" data-siteid="${site.id}">Удалить</button>
                                    <button class="btn-secondary open-site-detail-btn" data-siteid="${site.id}">Детали и задачи</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('backToMain').addEventListener('click', () => renderMainPage());
        document.getElementById('addSiteBtn').addEventListener('click', () => showTemplateSelectionModal(prodId));
        
        document.querySelectorAll('.edit-site-btn').forEach(btn => {
            btn.addEventListener('click', () => showEditSiteModal(prodId, btn.getAttribute('data-siteid')));
        });
        document.querySelectorAll('.delete-site-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (confirm('Удалить участок?')) {
                    prod.sites = prod.sites.filter(s => s.id !== btn.getAttribute('data-siteid'));
                    saveData();
                    renderSitesPage(prodId);
                }
            });
        });
        document.querySelectorAll('.open-site-detail-btn').forEach(btn => {
            btn.addEventListener('click', () => renderSiteDetailPage(prodId, btn.getAttribute('data-siteid')));
        });
    }
    
    function showTemplateSelectionModal(prodId) {
        let selectedTemplateId = SITE_TEMPLATES[0].id;
        
        const modalHtml = `
            <div id="templateModal" class="modal" style="display:flex;">
                <div class="modal-content">
                    <h3>Выберите шаблон участка</h3>
                    <div class="templates-grid" id="templatesGrid">
                        ${SITE_TEMPLATES.map(t => `
                            <div class="template-card" data-id="${t.id}">
                                <h4>${escapeHtml(t.name)}</h4>
                                <p>Тип: ${escapeHtml(t.type)}</p>
                                <p>Деталей: ${t.defaultParts.length}</p>
                                <p>Задач: ${t.defaultTasks.length}</p>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn-primary" id="nextStepBtn">Далее →</button>
                    <button class="btn-secondary" id="cancelTemplateBtn">Отмена</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('templateModal');
        
        document.querySelectorAll('.template-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedTemplateId = card.getAttribute('data-id');
            });
        });
        
        document.getElementById('nextStepBtn').addEventListener('click', () => {
            modal.remove();
            showCustomizeSiteModal(prodId, selectedTemplateId);
        });
        document.getElementById('cancelTemplateBtn').addEventListener('click', () => modal.remove());
    }
    
    function showCustomizeSiteModal(prodId, templateId) {
        const template = SITE_TEMPLATES.find(t => t.id === templateId);
        if (!template) return;
        
        let parts = template.defaultParts.map(p => ({ ...p, id: generateId() }));
        let tasks = template.defaultTasks.map(t => ({ ...t, id: generateId() }));
        
        function renderCustomizeModal() {
            const modalHtml = `
                <div id="customizeModal" class="modal" style="display:flex;">
                    <div class="modal-content">
                        <h3>Настройка участка: ${escapeHtml(template.name)}</h3>
                        <label>Имя участка (можно изменить):</label>
                        <input type="text" id="siteName" value="${escapeHtml(template.name)}">
                        
                        <h4>Детали участка:</h4>
                        <div id="partsEditor">
                            ${parts.map((part, idx) => `
                                <div class="part-item">
                                    <input type="text" placeholder="Название детали" value="${escapeHtml(part.name)}" data-part-index="${idx}" data-field="name">
                                    <input type="text" placeholder="Описание" value="${escapeHtml(part.description)}" data-part-index="${idx}" data-field="description">
                                    <button class="btn-secondary btn-danger remove-part-btn" data-index="${idx}">×</button>
                                </div>
                            `).join('')}
                        </div>
                        <button class="btn-secondary" id="addPartBtn">+ Добавить деталь</button>
                        
                        <h4 style="margin-top:20px;">Задачи участка:</h4>
                        <div id="tasksEditor">
                            ${tasks.map((task, idx) => `
                                <div class="task-item">
                                    <input type="text" placeholder="Заголовок" value="${escapeHtml(task.title)}" data-task-index="${idx}" data-field="title">
                                    <input type="text" placeholder="Описание" value="${escapeHtml(task.description)}" data-task-index="${idx}" data-field="description">
                                    <select data-task-index="${idx}" data-field="status">
                                        <option ${task.status === 'Ожидает' ? 'selected' : ''}>Ожидает</option>
                                        <option ${task.status === 'В работе' ? 'selected' : ''}>В работе</option>
                                        <option ${task.status === 'Выполнено' ? 'selected' : ''}>Выполнено</option>
                                    </select>
                                    <button class="btn-secondary btn-danger remove-task-btn" data-index="${idx}">×</button>
                                </div>
                            `).join('')}
                        </div>
                        <button class="btn-secondary" id="addTaskBtn">+ Добавить задачу</button>
                        
                        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
                            <button class="btn-secondary" id="backToTemplatesBtn">← Назад</button>
                            <button class="btn-primary" id="createSiteBtn">Создать участок</button>
                        </div>
                    </div>
                </div>
            `;
            
            const existingModal = document.getElementById('customizeModal');
            if (existingModal) existingModal.remove();
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = document.getElementById('customizeModal');
            
            document.querySelectorAll('[data-part-index]').forEach(input => {
                input.addEventListener('change', (e) => {
                    const idx = parseInt(input.getAttribute('data-part-index'));
                    const field = input.getAttribute('data-field');
                    if (parts[idx]) parts[idx][field] = input.value;
                });
            });
            
            document.querySelectorAll('.remove-part-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    parts.splice(idx, 1);
                    renderCustomizeModal();
                });
            });
            
            document.querySelectorAll('[data-task-index]').forEach(input => {
                input.addEventListener('change', (e) => {
                    const idx = parseInt(input.getAttribute('data-task-index'));
                    const field = input.getAttribute('data-field');
                    if (tasks[idx]) tasks[idx][field] = input.value;
                });
            });
            
            document.querySelectorAll('.remove-task-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    tasks.splice(idx, 1);
                    renderCustomizeModal();
                });
            });
            
            document.getElementById('addPartBtn').addEventListener('click', () => {
                parts.push({ name: 'Новая деталь', description: 'Описание', id: generateId() });
                renderCustomizeModal();
            });
            
            document.getElementById('addTaskBtn').addEventListener('click', () => {
                tasks.push({ title: 'Новая задача', description: 'Описание', status: 'Ожидает', id: generateId() });
                renderCustomizeModal();
            });
            
            document.getElementById('backToTemplatesBtn').addEventListener('click', () => {
                modal.remove();
                showTemplateSelectionModal(prodId);
            });
            
            document.getElementById('createSiteBtn').addEventListener('click', () => {
                const siteName = document.getElementById('siteName').value.trim();
                if (!siteName) {
                    alert('Введите имя участка');
                    return;
                }
                
                const prod = productions.find(p => p.id === prodId);
                if (prod) {
                    prod.sites.push({
                        id: generateId(),
                        name: siteName,
                        type: template.type,
                        parts: parts,
                        tasks: tasks
                    });
                    saveData();
                    renderSitesPage(prodId);
                }
                modal.remove();
            });
        }
        
        renderCustomizeModal();
    }
    
    function showEditSiteModal(prodId, siteId) {
        const prod = productions.find(p => p.id === prodId);
        const site = prod?.sites.find(s => s.id === siteId);
        if (!site) return;
        
        const modalHtml = `
            <div id="editSiteModal" class="modal" style="display:flex;">
                <div class="modal-content">
                    <h3>Редактировать участок</h3>
                    <label>Имя:</label>
                    <input type="text" id="editSiteName" value="${escapeHtml(site.name)}">
                    <label>Тип:</label>
                    <input type="text" id="editSiteType" value="${escapeHtml(site.type)}">
                    <div style="display:flex; justify-content:flex-end; gap:10px;">
                        <button class="btn-secondary" id="cancelEditSiteBtn">Отмена</button>
                        <button class="btn-primary" id="updateSiteBtn">Обновить</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('editSiteModal');
        
        document.getElementById('updateSiteBtn').addEventListener('click', () => {
            site.name = document.getElementById('editSiteName').value.trim() || site.name;
            site.type = document.getElementById('editSiteType').value.trim() || site.type;
            saveData();
            renderSitesPage(prodId);
            modal.remove();
        });
        document.getElementById('cancelEditSiteBtn').addEventListener('click', () => modal.remove());
    }
    
    function renderSiteDetailPage(prodId, siteId) {
        const prod = productions.find(p => p.id === prodId);
        const site = prod?.sites.find(s => s.id === siteId);
        if (!site) { renderSitesPage(prodId); return; }
        
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div class="site-page">
                <a class="back-link" id="backToSites">← К списку участков</a>
                <h2>Участок: ${escapeHtml(site.name)} (${escapeHtml(site.type)})</h2>
                <div class="section">
                    <div class="section-title">Детали</div>
                    <ul class="parts-list" id="partsList">
                        ${site.parts.map(part => `
                            <li>
                                <span><strong>${escapeHtml(part.name)}</strong>: ${escapeHtml(part.description)}</span>
                                <div>
                                    <button class="btn-secondary edit-part-btn" data-partid="${part.id}">Ред.</button>
                                    <button class="btn-secondary btn-danger delete-part-btn" data-partid="${part.id}">Удалить</button>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                    <button class="btn-secondary" id="addPartBtn">+ Добавить деталь</button>
                </div>
                <div class="section">
                    <div class="section-title">Задачи</div>
                    <ul class="tasks-list" id="tasksList">
                        ${site.tasks.map(task => `
                            <li>
                                <span><strong>${escapeHtml(task.title)}</strong>: ${escapeHtml(task.description)} <span class="status-badge">${escapeHtml(task.status)}</span></span>
                                <div>
                                    <button class="btn-secondary edit-task-btn" data-taskid="${task.id}">Ред.</button>
                                    <button class="btn-secondary btn-danger delete-task-btn" data-taskid="${task.id}">Удалить</button>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                    <button class="btn-secondary" id="addTaskBtn">+ Добавить задачу</button>
                </div>
                <div style="margin-top:20px;">
                    <button class="btn-success" id="finalizeBtn">Сформировать</button>
                </div>
            </div>
        `;
        
        document.getElementById('backToSites').addEventListener('click', () => renderSitesPage(prodId));
        document.getElementById('finalizeBtn').addEventListener('click', () => {
            alert(`Участок "${site.name}" сформирован`);
            renderSitesPage(prodId);
        });
        
        document.getElementById('addPartBtn').addEventListener('click', () => {
            const name = prompt('Название детали:');
            if (name) {
                const description = prompt('Описание:');
                site.parts.push({ id: generateId(), name, description: description || '' });
                saveData();
                renderSiteDetailPage(prodId, siteId);
            }
        });
        
        document.getElementById('addTaskBtn').addEventListener('click', () => {
            const title = prompt('Заголовок задачи:');
            if (title) {
                const description = prompt('Описание:');
                site.tasks.push({ id: generateId(), title, description: description || '', status: 'Ожидает' });
                saveData();
                renderSiteDetailPage(prodId, siteId);
            }
        });
        
        document.querySelectorAll('.edit-part-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const partId = btn.getAttribute('data-partid');
                const part = site.parts.find(p => p.id === partId);
                if (part) {
                    const newName = prompt('Новое название:', part.name);
                    if (newName) {
                        part.name = newName;
                        part.description = prompt('Новое описание:', part.description) || '';
                        saveData();
                        renderSiteDetailPage(prodId, siteId);
                    }
                }
            });
        });
        
        document.querySelectorAll('.delete-part-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (confirm('Удалить деталь?')) {
                    const partId = btn.getAttribute('data-partid');
                    site.parts = site.parts.filter(p => p.id !== partId);
                    saveData();
                    renderSiteDetailPage(prodId, siteId);
                }
            });
        });
        
        document.querySelectorAll('.edit-task-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const taskId = btn.getAttribute('data-taskid');
                const task = site.tasks.find(t => t.id === taskId);
                if (task) {
                    const newTitle = prompt('Новый заголовок:', task.title);
                    if (newTitle) {
                        task.title = newTitle;
                        task.description = prompt('Новое описание:', task.description) || '';
                        const newStatus = prompt('Статус (Ожидает/В работе/Выполнено):', task.status);
                        if (newStatus) task.status = newStatus;
                        saveData();
                        renderSiteDetailPage(prodId, siteId);
                    }
                }
            });
        });
        
        document.querySelectorAll('.delete-task-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (confirm('Удалить задачу?')) {
                    const taskId = btn.getAttribute('data-taskid');
                    site.tasks = site.tasks.filter(t => t.id !== taskId);
                    saveData();
                    renderSiteDetailPage(prodId, siteId);
                }
            });
        });
    }
    
    function exportData() {
        const dataStr = JSON.stringify(productions, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'productions_backup.json';
        a.click();
        URL.revokeObjectURL(url);
    }
    
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    productions = imported;
                    saveData();
                    renderMainPage();
                    alert('Импорт успешен');
                } else {
                    alert('Неверный формат');
                }
            } catch(err) {
                alert('Ошибка импорта');
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    }
    
    function clearAllData() {
        if (confirm('Удалить ВСЕ данные?')) {
            productions = [];
            saveData();
            renderMainPage();
        }
    }
    
    // Запуск
    loadData();
</script>
</body>
</html>
